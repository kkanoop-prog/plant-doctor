services:
  - type: web
    name: plant-doctor
    env: python
    runtime: python-3.11
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.main:app
    healthCheckPath: /health
